# --- FÁZE 2: VÝKON A ARCHITEKTURA (P?IDÁNO) ---
# Mitigace N+1 selectu: Hibernate na?te asociace v dávkách po 20 místo po jedné.
# Toto drasticky sni?uje po?et dotaz? do databáze p?i výpisu seznam? (nap?. sm?n s ú?astníky).
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Optimalizace hromadných operací (batching):
# Zvy?uje výkon p?i ukládání velkého mno?ství dat najednou.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Povolí z actuatoru jen základní info o tom, jestli server b??í (health) a metriky.
# V?echny ostatní (v?etn? nebezpe?ného env a heapdump) z?stanou vypnuté/skryté.
management.endpoints.web.exposure.include=health,metrics
# Schováme to pod jinou URL, aby to boti tak snadno nena?li
management.endpoints.web.base-path=/sysops/telemetry
# Uká?e detaily o chybách jen pokud je u?ivatel p?ihlá?ený (proti úniku info)
server.error.include-message=never
server.error.include-binding-errors=never